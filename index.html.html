<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCI Webcam - Futuristic Design</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* GLOBAL STYLES */
body {
  margin:0;
  padding:0;
  font-family: 'Rubik', sans-serif;
  background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #fff;
}

/* PARTICLES CANVAS */
#particles {
  position: fixed;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
  z-index:0;
}

/* GLASS CONTAINER */
.container {
  position: relative;
  backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  max-width: 720px;
  width: 90%;
  z-index: 1;
}

/* HEADER */
h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 30px;
  color: #fff;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

/* VIDEO */
video {
  border-radius: 20px;
  border: 3px solid rgba(255,255,255,0.6);
  box-shadow: 0 0 25px rgba(0,255,255,0.5), 0 0 40px rgba(0,255,255,0.2) inset;
  width: 100%;
  max-width: 640px;
  margin-bottom: 20px;
  transition: transform 0.3s ease, box-shadow 0.5s ease;
}
video:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,255,255,0.8), 0 0 50px rgba(0,255,255,0.3) inset;
}

/* BUTTON */
button {
  background: linear-gradient(45deg, #1abc9c, #16a085);
  border: none;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  padding: 12px 28px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
button:hover {
  background: linear-gradient(45deg, #16a085, #1abc9c);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 25px rgba(0,255,255,0.4);
}

/* STATUS TEXT */
#webcamoff {
  margin-top: 20px;
  font-size: 18px;
  font-weight: 500;
  color: #ffd700;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
}

/* RESPONSIVE */
@media(max-width:768px){
  .container { padding:30px 20px; }
  h2 { font-size:24px; }
  video { max-width:100%; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <h2>Human Computer Interaction Webcam</h2>
  <video id="webcam" autoplay></video>
  <br>
  <button onclick="off_cam()">Turn it OFF</button>
  <div id="webcamoff"></div>
</div>

<script>
// WEBCAM FUNCTIONALITY
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(function(stream) {
    document.getElementById('webcam').srcObject = stream;
  })
  .catch(function(err) {
    console.error("Error: " + err);
    document.getElementById('webcamoff').innerText = "Error accessing webcam.";
  });
} else {
  document.getElementById('webcamoff').innerText = "Webcam not supported.";
}

function off_cam() {
  if (confirm("Are you sure you want to turn it off?")) {
    let stream = document.getElementById('webcam').srcObject;
    if (stream) stream.getTracks().forEach(track => track.stop());
    document.getElementById('webcam').srcObject = null;
    document.getElementById('webcamoff').innerText = "Your cam is already turned off!";
  }
}

// PARTICLES BACKGROUND
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedX = Math.random() * 1 - 0.5;
    this.speedY = Math.random() * 1 - 0.5;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x>canvas.width)this.x=0;
    if(this.x<0)this.x=canvas.width;
    if(this.y>canvas.height)this.y=0;
    if(this.y<0)this.y=canvas.height;
  }
  draw(){
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<100;i++){
    particlesArray.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => {p.update(); p.draw();});
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});
</script>

</body>
</html>
